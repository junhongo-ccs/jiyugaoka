<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">自由が丘再開発俯瞰図 PoC</title>
  <desc id="desc">低層商業地から駅前再開発への変化を示す俯瞰風のイメージ図</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="55%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <g opacity="0.14">
    <path d="M0 220L1600 220" stroke="#ffffff" stroke-width="2" />
    <path d="M0 420L1600 420" stroke="#ffffff" stroke-width="2" />
    <path d="M0 620L1600 620" stroke="#ffffff" stroke-width="2" />
    <path d="M260 0L260 900" stroke="#ffffff" stroke-width="2" />
    <path d="M640 0L640 900" stroke="#ffffff" stroke-width="2" />
    <path d="M1020 0L1020 900" stroke="#ffffff" stroke-width="2" />
    <path d="M1400 0L1400 900" stroke="#ffffff" stroke-width="2" />
  </g>

  <g transform="translate(270 90) skewX(-28) scale(1 0.86)" filter="url(#shadow)">
    <rect x="160" y="210" width="980" height="420" rx="40" fill="#111827" stroke="#475569" stroke-width="4"/>
    <rect x="530" y="40" width="70" height="700" fill="url(#road)" opacity="0.9"/>
    <rect x="170" y="350" width="980" height="36" fill="url(#road)" opacity="0.8"/>

    <polygon points="620,250 760,250 820,480 680,480" fill="#fb7185"/>
    <polygon points="700,100 760,250 620,250 560,100" fill="#fecdd3"/>
    <text x="600" y="70" fill="#ffe4e6" font-size="36" font-family="Arial, sans-serif">自由が丘駅前タワー</text>

    <polygon points="810,280 930,280 970,430 850,430" fill="#f43f5e"/>
    <polygon points="850,180 930,280 810,280 730,180" fill="#fecdd3"/>
    <text x="870" y="160" fill="#ffe4e6" font-size="28" font-family="Arial, sans-serif">1丁目29番地区</text>

    <rect x="160" y="344" width="980" height="48" fill="#34d399" opacity="0.28"/>
    <text x="250" y="330" fill="#d1fae5" font-size="30" font-family="Arial, sans-serif">楽歩地区道路拡幅</text>

    <polygon points="260,180 380,180 420,290 300,290" fill="#38bdf8"/>
    <polygon points="300,110 380,180 260,180 180,110" fill="#bae6fd"/>
    <text x="180" y="90" fill="#e0f2fe" font-size="28" font-family="Arial, sans-serif">旧低層雑貨街</text>

    <polygon points="1030,150 1120,150 1160,250 1070,250" fill="#fbbf24"/>
    <polygon points="1070,100 1120,150 1030,150 980,100" fill="#fde68a"/>
    <text x="980" y="80" fill="#fef3c7" font-size="26" font-family="Arial, sans-serif">奥沢7丁目新築戸建</text>
  </g>

  <g>
    <text x="90" y="94" fill="#f8fafc" font-size="54" font-family="Arial, sans-serif" font-weight="700">自由が丘再開発マップ PoC</text>
    <text x="92" y="140" fill="#cbd5e1" font-size="26" font-family="Arial, sans-serif">2023 低層商業 → 2026 駅前再編の俯瞰イメージ</text>
    <text x="92" y="790" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">QGIS 3D 表示前のプレゼン用 SVG モック</text>
  </g>
</svg>

